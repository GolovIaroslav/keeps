name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    # Build on the oldest supported Ubuntu baseline so bundled libraries also
    # run on newer distributions.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install portable Python 3.12
        run: uv python install 3.12

      - name: Install AppImage build/runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            breeze-icon-theme \
            libegl1 libglib2.0-0 libfontconfig1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfreetype6 libzstd1 libpcre2-8-0 libx11-6 \
            libwayland-client0 libwayland-cursor0 libxcb1

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./packaging/build-appimage.sh "$VERSION"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeps-appimage
          path: keeps-*-x86_64.AppImage

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" || true
          gh release upload "$GITHUB_REF_NAME" keeps-*-x86_64.AppImage --clobber
        env:
          GH_TOKEN: ${{ github.token }}
