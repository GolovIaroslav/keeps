name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install portable Python 3.12
        run: uv python install 3.12

      - name: Install Breeze icon theme (for the bundled app icon)
        run: sudo apt-get update && sudo apt-get install -y breeze-icon-theme

      - name: Build AppDir
        run: |
          set -euo pipefail
          PYROOT="$(dirname "$(dirname "$(uv python find 3.12)")")"
          APPDIR="$PWD/AppDir"
          mkdir -p "$APPDIR/usr"

          # -L dereferences symlinks so the copy is fully self-contained --
          # a plain `cp -a` was observed (in CI, not locally) to leave the
          # copied interpreter still resolving scripts/site-packages back to
          # $PYROOT's original path, which is gone once this step ends.
          cp -aL "$PYROOT" "$APPDIR/usr/python312"

          # Fail loudly here instead of silently shipping an empty AppImage
          # if the copy isn't actually self-contained (this is exactly the
          # bug this assertion caught in the first real CI run).
          "$APPDIR/usr/python312/bin/python3.12" -c "import sys; assert sys.prefix.startswith('$APPDIR'), f'sys.prefix={sys.prefix!r} escaped the AppDir'; print('interpreter self-contained, sys.prefix =', sys.prefix)"

          "$APPDIR/usr/python312/bin/python3.12" -m pip install --break-system-packages --no-input ".[ai]"

          "$APPDIR/usr/python312/bin/python3.12" -c "import keeps, PySide6, onnxruntime, cv2, numpy, tokenizers; print('all deps import fine from the AppDir copy')"
          du -sh "$APPDIR"

          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/python312/bin/python3.12" -c "from keeps.app import main; main()" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          cp packaging/keeps.desktop "$APPDIR/keeps.desktop"
          ICON="$(find /usr/share/icons/breeze -iname 'edit-paste.svg' | sort | tail -1)"
          cp "$ICON" "$APPDIR/edit-paste.svg"

      - name: Download appimagetool
        run: |
          curl -sL -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "keeps-${VERSION}-x86_64.AppImage"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeps-appimage
          path: keeps-*-x86_64.AppImage

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" || true
          gh release upload "$GITHUB_REF_NAME" keeps-*-x86_64.AppImage --clobber
        env:
          GH_TOKEN: ${{ github.token }}
