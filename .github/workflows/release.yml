name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install portable Python 3.12
        run: uv python install 3.12

      - name: Install Breeze icon theme (for the bundled app icon)
        run: sudo apt-get update && sudo apt-get install -y breeze-icon-theme

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./packaging/build-appimage.sh "$VERSION"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeps-appimage
          path: keeps-*-x86_64.AppImage

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" || true
          gh release upload "$GITHUB_REF_NAME" keeps-*-x86_64.AppImage --clobber
        env:
          GH_TOKEN: ${{ github.token }}
