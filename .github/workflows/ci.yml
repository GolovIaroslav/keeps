name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest
